<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал бронирований — Система бронирования корпоративных ресурсов</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="logo">RB</div>
        <h2>Resource Booking</h2>
        <nav>
            <a href="/" class="nav-link">Главная</a>
            <a href="/resources.html" class="nav-link">Ресурсы</a>
            <a href="/booking.html" class="nav-link">Создать бронирование</a>
            <a href="/bookings.html" class="nav-link active">Журнал бронирований</a>
        </nav>
    </aside>

    <main class="content">
        <header class="page-header">
            <div>
                <h1>Журнал бронирований</h1>
                <p>Просмотр созданных заявок и отмена активных бронирований</p>
            </div>
            <button class="btn" onclick="loadBookingsPage()">Обновить</button>
        </header>

        <section class="panel">
            <div class="filters">
                <label for="statusFilter">Фильтр по статусу:</label>
                <select id="statusFilter" onchange="loadBookingsPage()">
                    <option value="ALL">Все</option>
                    <option value="CONFIRMED">Подтверждённые</option>
                    <option value="CANCELLED">Отменённые</option>
                </select>
            </div>
            <div id="bookingsMessage" class="message-box"></div>
        </section>

        <section class="panel">
            <div id="bookingCards" class="card-grid"></div>
        </section>
    </main>
</div>

<script src="/script.js"></script>
</body>
</html>
